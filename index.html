      {id:"635635c2c3c6",t:"DNS Basic Course \"A\"",p:"DNS / Prague School of Rehabilitation",s:"2026-10-30",e:"2026-11-01",loc:"San Diego, CA",aud:"PT, DC, MD, DO, ATC, manual therapists, S&C coaches",ceu:"self-submit",n:"DNS = Dynamic Neuromuscular Stabilization (Kolar method). CA PT CEU via self-submission.",url:"https://www.rehabps.cz/rehab/co.php"},
      {id:"502d56c8b2d5",t:"ELDOA® 4",p:"ELDOA",s:"2026-11-06",e:"2026-11-06",loc:"Seal Beach, CA",aud:"PT, DC, ATC, S&C, Pilates, yoga, MD/DO",ceu:"self-submit",n:"Cross-disciplinary movement education. CA PTs typically self-submit; NSCA CEUs are standard.",url:"https://www.somavoyer.com/course-calendar"},
      {id:"221099351181",t:"PNF: Functional Neuromuscular and Motor Control",p:"Institute of Physical Art (IPA)",s:"2026-11-06",e:"2026-11-08",loc:"Fountain Valley, CA",aud:"PT, PTA",ceu:"yes",n:"IPA courses count toward CFMT Certification and IPA Residency/Fellowship.",url:"https://instituteofphysicalart.com/scheduled-courses/"},
      {id:"b1193db6bb41",t:"PNF: Functional Neuromuscular and Motor Control",p:"Institute of Physical Art (IPA)",s:"2026-11-06",e:"2026-11-08",loc:"San Carlos, CA",aud:"PT, PTA",ceu:"yes",n:"IPA courses count toward CFMT Certification and IPA Residency/Fellowship.",url:"https://instituteofphysicalart.com/scheduled-courses/"},
      {id:"add97fd7018b",t:"KSC: Kinetic Shoulder Complex",p:"Institute of Physical Art (IPA)",s:"2026-11-07",e:"2026-11-08",loc:"Fremont, CA",aud:"PT, PTA",ceu:"yes",n:"IPA courses count toward CFMT Certification and IPA Residency/Fellowship.",url:"https://instituteofphysicalart.com/scheduled-courses/"},
      {id:"efef0e94686a",t:"FMUE: Functional Mobilization Upper Extremities",p:"Institute of Physical Art (IPA)",s:"2026-11-13",e:"2026-11-15",loc:"Glendora, CA",aud:"PT, PTA",ceu:"yes",n:"IPA courses count toward CFMT Certification and IPA Residency/Fellowship.",url:"https://instituteofphysicalart.com/scheduled-courses/"},
      {id:"9e6def610aea",t:"Myokinematic Restoration",p:"Postural Restoration Institute (PRI)",s:"2026-11-14",e:"2026-11-15",loc:"Valencia, CA",aud:"PT, PTA, OT, DC, ATC, S&C, LMT, Pilates instructors",ceu:"reciprocity",n:"PRI courses are PT board approved with reciprocity in AZ, CO, OR, WA and many other states; CA requires self-submission.",url:"https://www.posturalrestoration.com/courses/"},
      {id:"fbfe5299f270",t:"Level 1 with Full MFD Kit",p:"Integrated Movement Health / Cup Therapy",s:"2026-11-14",e:"2026-11-14",loc:"Laguna Niguel, CA",aud:"PT, ATC, LMT, PTA, OT, MD, DO, LAc",ceu:"yes",n:"Provider lists CA PT board reciprocity (CERS-route); FSBPT-credentialed in most states.",url:"https://www.cuptherapy.com/product-page/laguna-niguel-ca-level-1-with-full-mfd-kit"},
      {id:"17725e538f99",t:"Level 2 Advanced with MFD Precision Pump",p:"Integrated Movement Health / Cup Therapy",s:"2026-11-15",e:"2026-11-15",loc:"Laguna Niguel, CA",aud:"PT, ATC, LMT, PTA, OT, MD, DO, LAc",ceu:"yes",n:"Provider lists CA PT board reciprocity (CERS-route); FSBPT-credentialed in most states.",url:"https://www.cuptherapy.com/product-page/laguna-niguel-ca-level-2-advanced-with-mfd-precision-pump"},
      {id:"9dc9f1ed70d9",t:"SomaTherapy: 3-3: 2TLS — Trunk & Pelvis",p:"SomaVOYER",s:"2026-12-04",e:"2026-12-04",loc:"Newport Beach, CA",aud:"PT, DC, ATC, S&C, Pilates, yoga, MD/DO",ceu:"self-submit",n:"Cross-disciplinary movement education. CA PTs typically self-submit; NSCA CEUs are standard.",url:"https://www.somavoyer.com/course-calendar"},
      {id:"561ccbdc3253",t:"SomaTraining: 3-2: Proprioception & Awareness",p:"SomaVOYER",s:"2026-12-10",e:"2026-12-10",loc:"Seal Beach, CA",aud:"PT, DC, ATC, S&C, Pilates, yoga, MD/DO",ceu:"self-submit",n:"Cross-disciplinary movement education. CA PTs typically self-submit; NSCA CEUs are standard.",url:"https://www.somavoyer.com/course-calendar"},
      {id:"e4faefd24a94",t:"SomaTraining: 2-2: Myofascial Stretching",p:"SomaVOYER",s:"2026-12-12",e:"2026-12-12",loc:"Seal Beach, CA",aud:"PT, DC, ATC, S&C, Pilates, yoga, MD/DO",ceu:"self-submit",n:"Cross-disciplinary movement education. CA PTs typically self-submit; NSCA CEUs are standard.",url:"https://www.somavoyer.com/course-calendar"},
      {id:"912945473929",t:"DNS Intermediate Course \"C\"",p:"DNS / Prague School of Rehabilitation",s:"2027-01-16",e:"2027-01-18",loc:"Pasadena, CA",aud:"PT, DC, MD, DO, ATC, manual therapists, S&C coaches",ceu:"self-submit",n:"DNS = Dynamic Neuromuscular Stabilization (Kolar method). CA PT CEU via self-submission.",url:"https://www.rehabps.cz/rehab/co.php"},
      {id:"ab54b71292f1",t:"DNS Intermediate Course \"C\"",p:"DNS / Prague School of Rehabilitation",s:"2027-01-16",e:"2027-01-18",loc:"Pasadena, CA",aud:"PT, DC, MD, DO, ATC, manual therapists, S&C coaches",ceu:"self-submit",n:"DNS = Dynamic Neuromuscular Stabilization (Kolar method). CA PT CEU via self-submission.",url:"https://www.rehabps.cz/rehab/co.php"},
      {id:"98d128b82de2",t:"DNS Basic Course \"A\"",p:"DNS / Prague School of Rehabilitation",s:"2027-02-27",e:"2027-02-28",loc:"Pasadena, CA",aud:"PT, DC, MD, DO, ATC, manual therapists, S&C coaches",ceu:"self-submit",n:"DNS = Dynamic Neuromuscular Stabilization (Kolar method). CA PT CEU via self-submission.",url:"https://www.rehabps.cz/rehab/co.php"},
      {id:"99790e7a4d43",t:"DNS Basic Course \"A\"",p:"DNS / Prague School of Rehabilitation",s:"2027-02-27",e:"2027-02-28",loc:"Pasadena, CA",aud:"PT, DC, MD, DO, ATC, manual therapists, S&C coaches",ceu:"self-submit",n:"DNS = Dynamic Neuromuscular Stabilization (Kolar method). CA PT CEU via self-submission.",url:"https://www.rehabps.cz/rehab/co.php"},
      {id:"b9f83614421a",t:"DNS Basic Course \"B\"",p:"DNS / Prague School of Rehabilitation",s:"2027-03-19",e:"2027-03-21",loc:"Pasadena, CA",aud:"PT, DC, MD, DO, ATC, manual therapists, S&C coaches",ceu:"self-submit",n:"DNS = Dynamic Neuromuscular Stabilization (Kolar method). CA PT CEU via self-submission.",url:"https://www.rehabps.cz/rehab/co.php"},
      {id:"c0be508d298e",t:"DNS Basic Course \"B\"",p:"DNS / Prague School of Rehabilitation",s:"2027-03-19",e:"2027-03-21",loc:"Pasadena, CA",aud:"PT, DC, MD, DO, ATC, manual therapists, S&C coaches",ceu:"self-submit",n:"DNS = Dynamic Neuromuscular Stabilization (Kolar method). CA PT CEU via self-submission.",url:"https://www.rehabps.cz/rehab/co.php"},
    ];
    /* @@END_COURSES_DATA@@ */

    const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const MONTH_FULL  = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    function getFormat(course) {
      const n = course.n.toLowerCase();
      if (n.includes("satellite")||n.includes("hybrid")||n.includes("online lecture")||n.includes("remote lectures")) return "hybrid";
      if (course.loc.toLowerCase().includes("online")||course.loc.toLowerCase().includes("virtual")) return "online";
      return "in-person";
    }
    function getCEUCategory(ceu) {
      if (ceu==="reciprocity") return "reciprocity";
      if (ceu==="self-submit") return "self-submit";
      return "approved";
    }
    const CEU_LABEL = {approved:"✓ Approved","self-submit":"⊕ Self-Submit",reciprocity:"↻ Reciprocity"};
    const CEU_COLOR = {approved:"bg-emerald-100 text-emerald-800","self-submit":"bg-sky-100 text-sky-800",reciprocity:"bg-amber-100 text-amber-800"};
    const FORMAT_COLOR = {"in-person":"bg-indigo-100 text-indigo-700",hybrid:"bg-violet-100 text-violet-700",online:"bg-rose-100 text-rose-700"};
    const PROVIDER_COLORS = {
      "Institute of Physical Art (IPA)":"#2563EB","DNS / Prague School of Rehabilitation":"#0891B2",
      "Integrated Movement Health / Cup Therapy":"#7C3AED","SomaVOYER":"#D97706","ELDOA":"#BE185D",
      "Active Release Techniques":"#B45309","Agile Physical Therapy":"#059669",
      "American Academy of Manipulative Therapy (AAMT)":"#DC2626","Postural Restoration Institute (PRI)":"#0E7490",
      "Great Lakes Seminars (GLS)":"#6D28D9","Barbell Rehab":"#B91C1C","AMSI Training":"#047857",
      "Functional Movement Systems (FMS)":"#1D4ED8","Herman & Wallace Pelvic Rehabilitation Institute":"#9333EA",
      "American Institute of Balance":"#0369A1",
    };
    function fmt(d) {
      if (!d) return "";
      const [y,m,day]=d.split("-");
      return `${MONTH_NAMES[+m-1]} ${+day}, ${y}`;
    }

    function Chip({label,active,onClick}) {
      return <button onClick={onClick} className={`px-3 py-1 rounded-full text-xs font-semibold border transition-all duration-150 cursor-pointer whitespace-nowrap ${active?"bg-teal-600 text-white border-teal-600":"bg-white text-slate-600 border-slate-200 hover:border-teal-400 hover:text-teal-700"}`}>{label}</button>;
    }

    function MultiSelect({options,selected,onChange,placeholder,colorMap}) {
      const [open,setOpen]=useState(false);
      const toggle=v=>onChange(selected.includes(v)?selected.filter(x=>x!==v):[...selected,v]);
      return (
        <div className="relative">
          <button onClick={()=>setOpen(o=>!o)} className="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-sm text-slate-700 hover:border-teal-400 transition-colors whitespace-nowrap">
            <span>{selected.length?`${selected.length} selected`:placeholder}</span><span className="text-slate-400">▾</span>
          </button>
          {open&&(
            <div className="absolute z-30 top-full mt-1 left-0 bg-white rounded-xl shadow-xl border border-slate-100 min-w-52 max-h-72 overflow-y-auto">
              {options.map(opt=>(
                <label key={opt} className="flex items-center gap-2.5 px-3 py-2 hover:bg-slate-50 cursor-pointer">
                  <input type="checkbox" checked={selected.includes(opt)} onChange={()=>toggle(opt)} className="accent-teal-600"/>
                  {colorMap&&<span className="inline-block w-2.5 h-2.5 rounded-full" style={{background:colorMap[opt]||"#94a3b8"}}/>}
                  <span className="text-sm text-slate-700 leading-tight">{opt}</span>
                </label>
              ))}
              {selected.length>0&&<button onClick={()=>onChange([])} className="w-full text-center text-xs text-rose-500 hover:text-rose-700 py-2 border-t border-slate-100">Clear all</button>}
            </div>
          )}
        </div>
      );
    }

    function CourseCard({course}) {
      const [expanded,setExpanded]=useState(false);
      const fmtL=getFormat(course), ceuC=getCEUCategory(course.ceu);
      const pc=PROVIDER_COLORS[course.p]||"#64748b";
      const soldOut=course.t.toLowerCase().includes("sold out");
      return (
        <div className={`bg-white rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-all duration-200 overflow-hidden flex flex-col ${soldOut?"opacity-60":""}`}>
          <div className="h-1" style={{background:pc}}/>
          <div className="p-4 flex-1 flex flex-col gap-3">
            <div className="flex flex-wrap items-center gap-1.5">
              <span className="text-xs font-bold text-slate-500 bg-slate-50 px-2 py-0.5 rounded-md border border-slate-200">{fmt(course.s)}{course.e&&course.e!==course.s?` – ${fmt(course.e)}`:""}</span>
              {soldOut&&<span className="text-xs font-bold text-rose-600 bg-rose-50 px-2 py-0.5 rounded-md border border-rose-200">SOLD OUT</span>}
            </div>
            <h3 className="font-bold text-slate-800 text-sm leading-snug">{course.t}</h3>
            <div className="flex items-center gap-1.5">
              <span className="inline-block w-2 h-2 rounded-full flex-shrink-0" style={{background:pc}}/>
              <span className="text-xs font-semibold" style={{color:pc}}>{course.p}</span>
            </div>
            <div className="flex items-center gap-1.5 text-xs text-slate-500">
              <svg className="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path strokeLinecap="round" strokeLinejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <span>{course.loc}</span>
            </div>
            <div className="text-xs text-slate-500 leading-tight"><span className="font-medium text-slate-600">Audience: </span>{course.aud}</div>
            <div className="flex flex-wrap gap-1.5 mt-auto pt-1">
              <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${CEU_COLOR[ceuC]}`}>{CEU_LABEL[ceuC]}</span>
              <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${FORMAT_COLOR[fmtL]}`}>{fmtL==="in-person"?"In-Person":fmtL.charAt(0).toUpperCase()+fmtL.slice(1)}</span>
            </div>
            {expanded&&<div className="text-xs text-slate-500 bg-slate-50 rounded-lg p-2.5 border border-slate-100 leading-relaxed mt-1">{course.n}</div>}
          </div>
          <div className="px-4 pb-4 flex gap-2">
            <button onClick={()=>setExpanded(e=>!e)} className="flex-1 text-xs font-semibold text-slate-500 hover:text-teal-700 hover:bg-teal-50 border border-slate-200 rounded-lg py-1.5 transition-colors">{expanded?"Hide notes ↑":"View notes ↓"}</button>
            <a href={course.url} target="_blank" rel="noopener noreferrer" className="flex-1 text-xs font-bold text-white text-center rounded-lg py-1.5 transition-colors" style={{background:pc}}>Register →</a>
          </div>
        </div>
      );
    }

    function App() {
      const [search,setSearch]=useState("");
      const [months,setMonths]=useState([]);
      const [years,setYears]=useState([]);
      const [format,setFormat]=useState("all");
      const [providers,setProviders]=useState([]);
      const [ceuFilter,setCeuFilter]=useState("all");
      const [sortBy,setSortBy]=useState("date");
      const [filtersOpen,setFiltersOpen]=useState(true);

      const allProviders=useMemo(()=>[...new Set(COURSES.map(c=>c.p))].sort(),[]);
      const allMonths=useMemo(()=>{
        const ms=new Set(COURSES.map(c=>`${c.s.slice(0,4)}-${c.s.slice(5,7)}`));
        return [...ms].sort().map(ym=>{const [y,m]=ym.split("-");return{value:ym,label:`${MONTH_FULL[+m-1]} ${y}`};});
      },[]);
      const toggleMonth=useCallback(v=>setMonths(ms=>ms.includes(v)?ms.filter(x=>x!==v):[...ms,v]),[]);

      const filtered=useMemo(()=>{
        let list=COURSES.filter(c=>{
          const q=search.toLowerCase();
          if(q&&!c.t.toLowerCase().includes(q)&&!c.p.toLowerCase().includes(q)&&!c.n.toLowerCase().includes(q)&&!c.loc.toLowerCase().includes(q))return false;
          if(months.length&&!months.includes(c.s.slice(0,7)))return false;
          if(years.length&&!years.includes(c.s.slice(0,4)))return false;
          if(format!=="all"&&getFormat(c)!==format)return false;
          if(providers.length&&!providers.includes(c.p))return false;
          if(ceuFilter!=="all"&&getCEUCategory(c.ceu)!==ceuFilter)return false;
          return true;
        });
        if(sortBy==="date")list.sort((a,b)=>a.s.localeCompare(b.s));
        if(sortBy==="provider")list.sort((a,b)=>a.p.localeCompare(b.p));
        if(sortBy==="location")list.sort((a,b)=>a.loc.localeCompare(b.loc));
        return list;
      },[search,months,years,format,providers,ceuFilter,sortBy]);

      const grouped=useMemo(()=>{
        const map={};
        for(const c of filtered){const k=c.s.slice(0,7);if(!map[k])map[k]=[];map[k].push(c);}
        return Object.entries(map).sort(([a],[b])=>a.localeCompare(b));
      },[filtered]);

      const hasFilters=search||months.length||years.length||format!=="all"||providers.length||ceuFilter!=="all";
      const clearAll=()=>{setSearch("");setMonths([]);setYears([]);setFormat("all");setProviders([]);setCeuFilter("all");};

      return (
        <div className="min-h-screen bg-slate-100">
          <header style={{background:"linear-gradient(135deg,#0c2340 0%,#1a4a6b 60%,#0e7490 100%)"}} className="text-white px-6 py-8 shadow-xl">
            <div className="max-w-7xl mx-auto flex flex-wrap items-start justify-between gap-4">
              <div>
                <span className="text-xs font-semibold text-teal-300 uppercase tracking-widest">CA Physical Therapy</span>
                <h1 className="heading text-3xl font-bold text-white leading-tight mt-1">CEU Course Listings</h1>
                <p className="text-slate-300 text-sm mt-1">{COURSES.length} courses · California only · In-person &amp; hybrid · PT-attendable</p>
              </div>
              <div className="flex items-center gap-2 text-xs text-slate-300 bg-white/10 px-3 py-1.5 rounded-full self-start mt-1">
                <span className="w-2 h-2 rounded-full bg-emerald-400 inline-block"/>
                Last scraped: {fmt(SCRAPED_DATE)}
              </div>
            </div>
          </header>

          <div className="sticky top-0 z-20 bg-white border-b border-slate-200 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 py-3">
              <div className="flex flex-wrap items-center gap-2 mb-3">
                <div className="relative flex-1 min-w-48">
                  <svg className="absolute left-2.5 top-2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search title, provider, notes…" className="w-full pl-8 pr-3 py-1.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"/>
                </div>
                <select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="px-3 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-teal-500 bg-white">
                  <option value="date">Sort: Date</option>
                  <option value="provider">Sort: Provider</option>
                  <option value="location">Sort: Location</option>
                </select>
                <button onClick={()=>setFiltersOpen(o=>!o)} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-600 hover:border-teal-400 hover:text-teal-700 transition-colors">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"/></svg>
                  Filters{hasFilters?" (active)":""}
                </button>
                {hasFilters&&<button onClick={clearAll} className="text-xs font-semibold text-rose-500 hover:text-rose-700 px-2 py-1.5">✕ Clear all</button>}
              </div>
              {filtersOpen&&(
                <div className="flex flex-col gap-2">
                  <div className="flex flex-wrap gap-1.5 items-center">
                    <span className="text-xs font-semibold text-slate-400 uppercase tracking-wide w-14 shrink-0">Month</span>
                    {allMonths.map(m=><Chip key={m.value} label={m.label} active={months.includes(m.value)} onClick={()=>toggleMonth(m.value)}/>)}
                  </div>
                  <div className="flex flex-wrap gap-2 items-center">
                    <span className="text-xs font-semibold text-slate-400 uppercase tracking-wide w-14 shrink-0">Format</span>
                    {["all","in-person","hybrid"].map(f=><Chip key={f} label={f==="all"?"All Formats":f.charAt(0).toUpperCase()+f.slice(1)} active={format===f} onClick={()=>setFormat(f)}/>)}
                    <span className="text-xs font-semibold text-slate-300 mx-1">|</span>
                    <span className="text-xs font-semibold text-slate-400 uppercase tracking-wide">CEU</span>
                    {[["all","All CEUs"],["approved","Approved"],["self-submit","Self-Submit"],["reciprocity","Reciprocity"]].map(([v,l])=><Chip key={v} label={l} active={ceuFilter===v} onClick={()=>setCeuFilter(v)}/>)}
                    <span className="text-xs font-semibold text-slate-300 mx-1">|</span>
                    <MultiSelect options={allProviders} selected={providers} onChange={setProviders} placeholder="All Providers" colorMap={PROVIDER_COLORS}/>
                  </div>
                </div>
              )}
            </div>
          </div>

          <main className="max-w-7xl mx-auto px-4 py-6">
            <div className="flex items-center justify-between mb-4">
              <p className="text-sm text-slate-500">Showing <span className="font-bold text-slate-700">{filtered.length}</span> of {COURSES.length} courses{hasFilters&&<span className="text-teal-600"> (filtered)</span>}</p>
              <div className="hidden sm:flex items-center gap-3 text-xs text-slate-400">
                <span className={`px-2 py-0.5 rounded-full font-semibold ${CEU_COLOR.approved}`}>✓ Approved</span>
                <span className={`px-2 py-0.5 rounded-full font-semibold ${CEU_COLOR["self-submit"]}`}>⊕ Self-Submit</span>
                <span className={`px-2 py-0.5 rounded-full font-semibold ${CEU_COLOR.reciprocity}`}>↻ Reciprocity</span>
              </div>
            </div>
            {filtered.length===0?(
              <div className="text-center py-20 text-slate-400">
                <div className="text-5xl mb-3">🔍</div>
                <p className="text-lg font-semibold text-slate-500">No courses match these filters</p>
                <button onClick={clearAll} className="mt-3 text-teal-600 hover:text-teal-800 text-sm font-semibold underline">Clear all filters</button>
              </div>
            ):(
              <div className="space-y-8">
                {grouped.map(([ym,courses])=>{
                  const [y,m]=ym.split("-");
                  return (
                    <section key={ym}>
                      <div className="flex items-center gap-3 mb-4">
                        <h2 className="heading text-xl font-bold text-slate-700">{MONTH_FULL[+m-1]} {y}</h2>
                        <span className="text-xs font-semibold text-slate-400 bg-slate-200 px-2 py-0.5 rounded-full">{courses.length}</span>
                        <div className="flex-1 h-px bg-slate-200"/>
                      </div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        {courses.map(c=><CourseCard key={c.id} course={c}/>)}
                      </div>
                    </section>
                  );
                })}
              </div>
            )}
          </main>

          <footer className="text-center text-xs text-slate-400 py-8 border-t border-slate-200 mt-4">
            <p>Data scraped {fmt(SCRAPED_DATE)} · {COURSES.length} PT-attendable courses · California in-person &amp; hybrid only</p>
            <p className="mt-1">CEU status: verify with provider before registering · Not legal/licensing advice</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
